{% extends 'base.html' %}
{% block title %}Delete Announcement{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card p-8 text-center">
        <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-5">
            <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">Delete Announcement?</h1>
        <p class="text-gray-500 text-sm mb-6">
            Are you sure you want to delete <span class="font-semibold text-gray-700">"{{ announcement.title }}"</span>? This cannot be undone.
        </p>
        <div class="flex gap-3 justify-center">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn-danger">Yes, Delete</button>
            </form>
            <a href="/news/{{ announcement.pk }}/" class="btn-secondary">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
